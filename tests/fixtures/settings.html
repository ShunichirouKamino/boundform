<!DOCTYPE html>
<html>
<head><title>Settings</title></head>
<body>
<form id="settings" method="post">
    <label for="age">Age</label>
    <input type="number" name="age" id="age" min="0" max="150" step="1" required />

    <label for="username">Username</label>
    <input type="text" name="username" id="username" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+" />

    <label for="website">Website</label>
    <input type="url" name="website" id="website" />

    <label for="bio">Bio</label>
    <textarea name="bio" minlength="10" maxlength="500"></textarea>

    <label for="role">Role</label>
    <select name="role" required>
        <option value="">Choose...</option>
        <option value="admin">Admin</option>
        <option value="user">User</option>
    </select>

    <input type="hidden" name="csrf_token" value="abc123" />
    <input type="submit" value="Save" />
</form>
</body>
</html>
