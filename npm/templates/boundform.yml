# boundform configuration
# Docs: https://github.com/ShunichirouKamino/boundform

pages:
  # Example: validate a login form
  - url: "http://localhost:3000/login"
    forms:
      - index: 0                    # First <form> on the page
        fields:
          email:
            type: email
            required: true
          password:
            type: password
            required: true

